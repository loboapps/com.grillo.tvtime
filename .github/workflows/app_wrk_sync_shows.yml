name: Sync Show Data

on:
  # Roda todo dia às 5h40 UTC — depois dos crons do finances (2h40/3h40/4h40 UTC),
  # essa sincronização é a de menor prioridade das quatro.
  schedule:
    - cron: '40 5 * * *'

  # Permite rodar manualmente pelo GitHub
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (não grava na base, só mostra o que seria sincronizado)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  sync-shows:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Definir modo dry-run
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "EFFECTIVE_DRY_RUN=false" >> $GITHUB_ENV
            echo "🕐 Scheduled run — sincronizando de verdade"
          else
            echo "EFFECTIVE_DRY_RUN=${{ github.event.inputs.dry_run }}" >> $GITHUB_ENV
            echo "🖐️  Manual run — dry_run=${{ github.event.inputs.dry_run }}"
          fi

      - name: Sincronizar séries
        run: node .github/app_scp_sync_shows.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DRY_RUN: ${{ env.EFFECTIVE_DRY_RUN }}

      - name: Salvar log em docs/cron
        if: always()
        run: |
          git add docs/cron
          if git diff --cached --quiet; then
            echo "Nada para commitar"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: log de sincronização $(date -u +%Y-%m-%d)"
            git push
          fi
